<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Login.css"> 
    <title>Atv2</title>
</head>

<body id="corpo">
    
    <img src="logo.jpg" alt="logo" class="logo">

    <div class="texto">
    <h1>Bem vindo ao PedeAgro!</h1>
    <h1 id="ppp">Faça o seu Login</h1>
    <br>

    <form action="get">
        <label for="email">Email</label><br>
        <input type="email" id="email" name="email" placeholder="Insira seu email" size="56px"><br><br>
        <label for="senha">Senha</label><br>
        <input type="password" id="senha" name="senha" placeholder="Insira sua senha..." size="56px"><br><br><br>
        <button class="btn">Entrar</button>

    </form>

    <p>Ainda não tem uma conta? <u>Cadastre-se</u></p>
    </div>
 
</body>

</html>
